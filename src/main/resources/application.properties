spring.application.name=api-web

spring.datasource.url=jdbc:h2:mem:gestaodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-plataform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Configuração do JWT (Use uma senha secreta e forte em produção)

api.security.token.secret=${JWT_SECRET:minha-chave-secreta-super-segura-123}